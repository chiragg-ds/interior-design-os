name: Weekly Status Log

# Posts a Weekly Status Log entry per active project every Monday morning IST.

on:
  schedule:
    - cron: '30 3 * * 1'    # Monday 09:00 IST (03:30 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install pyyaml

      - name: Post weekly status
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python3 notion-os/weekly_status_runner.py
