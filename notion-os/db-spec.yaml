          Version:        {rich_text: {}}
          Last Reviewed:  {date: {}}
          File Link:      {url: {}}
          Source Folder:  {rich_text: {}}

  - title: Operations Dashboard
    icon: 🧭
    databases: []  # Cockpit page rendered separately via cockpit_builder

# Relations between DBs are added in a second pass after all DBs exist.
# See post_provision_relations.yaml.
