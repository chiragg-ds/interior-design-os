          Owner:              {people: {}}
          Verification Date:  {date: {}}
          Client Sign-off:    {checkbox: {}}
          Evidence Link:      {url: {}}
          Notes:              {rich_text: {}}

  - title: Templates
    icon: 📚
    databases:
      - name: Templates
        properties:
          Template Name:  {title: {}}
          Template Type:  {select: {options: [{name: Contract}, {name: Questionnaire}, {name: Intake Checklist}, {name: Roadmap}, {name: Drawing Register}, {name: Handover Checklist}, {name: Presentation}, {name: Profile}, {name: Stationery}]}}
